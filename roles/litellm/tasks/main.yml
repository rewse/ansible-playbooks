---
- name: "litellm : Create configuration directory"
  ansible.builtin.file:
    path: /srv/litellm
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - litellm
    - config
    - litellm_litellm
    - litellm_litellm_init

- name: "litellm : Copy configuration file"
  ansible.builtin.copy:
    src: config.yml
    dest: /srv/litellm
    mode: '0644'
  notify: "litellm: Restart"
  tags:
    - litellm
    - config
    - litellm_litellm
    - litellm_litellm_config

- name: "docker : Resolve quarantined image"
  ansible.builtin.include_role:
    name: docker/quarantine
    apply:
      tags:
        - litellm
        - update
        - docker
        - quarantine
        - litellm_docker
        - litellm_docker_update
  vars:
    quarantine_repo: ghcr.io/berriai/litellm
    quarantine_tag_pattern: '^v\d+\.\d+\.\d+-stable(\.patch\.\d+)?$'
  tags:
    - litellm
    - update
    - docker
    - quarantine
    - litellm_docker
    - litellm_docker_update

- name: "docker : Add LiteLLM service to compose"
  ansible.builtin.blockinfile:
    path: /etc/compose.yml
    marker: "# {mark} ANSIBLE MANAGED BLOCK litellm"
    block: |2
        litellm:
          container_name: litellm
          image: {{ docker_quarantine_image_ref }}
          ports:
            - "4000:4000"
          volumes:
            - /srv/litellm/config.yml:/app/config.yml:ro
          environment:
            - AWS_ACCESS_KEY_ID={{ litellm_aws_access_key_id }}
            - AWS_SECRET_ACCESS_KEY={{ litellm_aws_secret_access_key }}
            - AWS_REGION_NAME=us-east-1
            - LITELLM_MASTER_KEY={{ litellm_master_key }}
            - LITELLM_SALT_KEY={{ litellm_salt_key }}
          restart: unless-stopped
          command: ["--config", "/app/config.yml", "--port", "4000"]
  notify: "litellm: Restart"
  when: docker_quarantine_image_ref | length > 0
  tags:
    - litellm
    - config
    - docker
    - litellm_docker
    - litellm_docker_config

- name: "docker : Pull and update container"
  community.docker.docker_compose_v2:
    project_src: /etc
    services: litellm
    state: present
    pull: missing
  when: docker_quarantine_image_ref | length > 0
  tags:
    - litellm
    - update
    - docker
    - litellm_docker
    - litellm_docker_update
