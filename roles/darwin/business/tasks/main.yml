---
# Use loop instead of passing a list to name: so that a failure on one cask does
# not abort the others. With a list, the module processes casks in order and
# stops at the first failure, leaving the rest uninstalled.
- name: "package : Install packages by homebrew_cask"
  community.general.homebrew_cask:
    name: "{{ item }}"
    update_homebrew: false
  loop:
    - asana
    - box-drive
    - claude
    - displaylink
    - font-noto-sans-cjk
    - gotomeeting
    - microsoft-teams
    - quip
    - tripmode
    - webex-meetings
  failed_when: false
  tags:
    - darwin
    - darwin_business
    - install
    - package
    - darwin_package
    - darwin_package_install

# Note: mas 6+ requires root privileges to install App Store apps, so this task
# needs become. Run the playbook with -K or --ask-become-pass.
- name: "package : Install packages by mas"
  ansible.builtin.command: mas install {{ item }}
  become: true
  changed_when: false
  loop:
    - 1274495053  # Microsoft To Do
    - 1639692859  # WattsConnected
  failed_when: false
  tags:
    - darwin
    - darwin_business
    - install
    - package
    - darwin_package
    - darwin_package_install

# Install toolbox
# Ref: https://docs.hub.amazon.dev/builder-toolbox/user-guide/getting-started/

# Run `mwinit -s` before the command

- name: "toolbox : Register repositories"
  ansible.builtin.command: toolbox registry add {{ item }}
  changed_when: false
  loop:
    - s3://buildertoolbox-registry-aisec-enfable-us-west-2/tools.json
    - s3://buildertoolbox-registry-isengard-cli-us-west-2/tools.json
  tags:
    - darwin
    - darwin_business
    - init
    - toolbox
    - darwin_toolbox
    - darwin_toolbox_init

# Ref: https://w.amazon.com/bin/view/DevAccount/Docs
- name: "toolbox : Install with toolbox"
  ansible.builtin.command: toolbox install {{ item }}
  changed_when: false
  loop:
    - aim
    - axe
    - brazilcli
    - enfable
    - isengard-cli
    - kiro-cli
  tags:
    - darwin
    - darwin_business
    - install
    - toolbox
    - darwin_toolbox
    - darwin_toolbox_install

- name: "toolbox : Update toolbox"
  ansible.builtin.command: toolbox update
  changed_when: false
  tags:
    - darwin
    - darwin_business
    - update
    - toolbox
    - darwin_toolbox
    - darwin_toolbox_update

- name: "enfable : Enable enfable"
  ansible.builtin.command: enfable enable
  changed_when: false
  tags:
    - darwin
    - darwin_business
    - init
    - enfable
    - darwin_enfable
    - darwin_enfable_init

- name: "kiro : Install Kiro IDE"
  ansible.builtin.command: axe init kiro
  args:
    creates: /Applications/Kiro.app
  tags:
    - darwin
    - darwin_business
    - install
    - kiro
    - darwin_kiro
    - darwin_kiro_install

- name: "aim : Install MCP servers"
  ansible.builtin.command: aim mcp install --print-client-config {{ item }}
  changed_when: false
  loop:
    - amazon-quick-mcp
    - amazon-sharepoint-mcp
    - atoz-mcp
    - aws-insights-mcp
    - aws-outlook-mcp
    - aws-sentral-mcp
    - builder-mcp
    - concur-mcp
    - pippin-mcp
    - slack-mcp
    - spec-req-mcp
    - specialist-super-agent-mcp
    - wis-web-search-mcp
  tags:
    - darwin
    - darwin_business
    - install
    - aim
    - darwin_aim
    - darwin_aim_install

- name: "aim : Update MCP servers"
  ansible.builtin.command: aim mcp update
  changed_when: false
  tags:
    - darwin
    - darwin_business
    - update
    - aim
    - darwin_aim
    - darwin_aim_update
