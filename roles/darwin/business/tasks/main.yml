---
- name: "package : Install packages by homebrew_cask"
  community.general.homebrew_cask:
    name:
      - asana
      - box-drive
      - displaylink
      - font-noto-sans-cjk
      - gotomeeting
      - microsoft-teams
      - monitorcontrol
      - quip
      - tripmode
      - webex-meetings
    update_homebrew: true
  failed_when: false
  tags:
    - darwin
    - darwin_business
    - install
    - package
    - darwin_package
    - darwin_package_install

- name: "package : Install packages by mas"
  ansible.builtin.command: mas install {{ item }}
  changed_when: false
  loop:
    - 1274495053  # Microsoft To Do
    - 1639692859  # WattsConnected
  failed_when: false
  tags:
    - darwin
    - darwin_business
    - install
    - package
    - darwin_package
    - darwin_package_install

# Install toolbox
# Ref: https://docs.hub.amazon.dev/builder-toolbox/user-guide/getting-started/

# Run `mwinit -s` before the command

# Ref: https://w.amazon.com/bin/view/Isengard-cli/
- name: "toolbox : Register isengard-cli repository"
  ansible.builtin.command: toolbox registry add s3://buildertoolbox-registry-isengard-cli-us-west-2/tools.json
  changed_when: false
  tags:
    - darwin
    - darwin_business
    - init
    - toolbox
    - darwin_toolbox
    - darwin_toolbox_init

# Ref: https://w.amazon.com/bin/view/DevAccount/Docs
- name: "toolbox : Install with toolbox"
  ansible.builtin.command: toolbox install {{ item }}
  changed_when: false
  loop:
    - aim
    - axe
    - isengard-cli
    - kiro-cli
  tags:
    - darwin
    - darwin_business
    - install
    - toolbox
    - darwin_toolbox
    - darwin_toolbox_install

- name: "toolbox : Update toolbox"
  ansible.builtin.command: toolbox update
  changed_when: false
  tags:
    - darwin
    - darwin_business
    - update
    - toolbox
    - darwin_toolbox
    - darwin_toolbox_update

- name: "kiro : Install Kiro IDE"
  ansible.builtin.command: axe init kiro
  args:
    creates: /Applications/Kiro.app
  tags:
    - darwin
    - darwin_business
    - install
    - kiro
    - darwin_kiro
    - darwin_kiro_install

- name: "aim : Install MCP servers"
  ansible.builtin.command: aim mcp install {{ item }}
  changed_when: false
  loop:
    - amazon-sharepoint-mcp
    - atoz-mcp
    - aws-outlook-mcp
    - aws-sentral-mcp
    - builder-mcp
    - pippin-mcp
    - slack-mcp
  tags:
    - darwin
    - darwin_business
    - install
    - aim
    - darwin_aim
    - darwin_aim_install

- name: "aim : Update MCP servers"
  ansible.builtin.command: aim mcp update
  changed_when: false
  tags:
    - darwin
    - darwin_business
    - update
    - aim
    - darwin_aim
    - darwin_aim_update

