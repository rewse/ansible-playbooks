---
- name: "package : Add homebrew taps"
  community.general.homebrew_tap:
    name: "{{ item }}"
  loop:
    - steipete/tap
    - xdevplatform/tap
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

- name: "package : Trust homebrew tap formulae"
  ansible.builtin.command: brew trust --formula {{ item }}
  changed_when: false
  loop:
    - steipete/tap/agent-browser
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

- name: "package : Trust homebrew tap casks"
  ansible.builtin.command: brew trust --cask {{ item }}
  changed_when: false
  loop:
    - xdevplatform/tap/xurl
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

# Update Homebrew once here rather than per item in the install loops below,
# where update_homebrew per iteration would re-run brew update many times.
- name: "package : Update homebrew"
  community.general.homebrew:
    update_homebrew: true
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

# Use loop instead of passing a list to name: so that a failure on one package
# does not abort the others. With a list, the module processes packages in order
# and stops at the first failure, leaving the rest uninstalled.
- name: "package : Install packages by homebrew"
  community.general.homebrew:
    name: "{{ item }}"
    update_homebrew: false
  loop:
    - agent-browser
    - ansible
    - ansible-lint
    - awscli
    - basedpyright
    - bat
    - chezmoi
    - coreutils
    - direnv
    - dotnet
    - fping
    - gh
    - gitleaks
    - gnu-sed
    - git-cliff
    - jq
    - mas
    - mcporter
    - mo
    - node
    - osv-scanner
    - pandoc
    - php
    - pipx
    - poppler
    - pv
    - pwgen
    - python3
    - rsync
    - skopeo
    - switchaudio-osx
    - svn
    - telnet
    - tree
    - typescript-language-server
    - uv
    - watch
    - zsh-vi-mode
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

- name: "package: Install Chrome for agent-browser"
  ansible.builtin.command: agent-browser install
  changed_when: false
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

# Use loop for the same reason as the homebrew task above: a list aborts at the
# first failing cask, which is common when an app already exists at the target
# path, leaving the rest uninstalled.
- name: "package : Install packages by homebrew_cask"
  community.general.homebrew_cask:
    name: "{{ item }}"
    update_homebrew: false
  loop:
    - 1password
    - 1password-cli
    - adobe-creative-cloud
    - amazon-chime
    - appcleaner
    - arc
    - atok
    - betterdisplay
    - calibre
    - calibrite-profiler
    - chatbox
    - cmux
    - corretto
    - cyberduck
    - dotnet-sdk
    - easydict
    - firefox
    - font-hackgen
    - font-new-york
    - font-sf-compact
    - font-sf-mono
    - font-sf-mono-for-powerline
    - font-sf-pro
    - font-source-sans-3
    - font-source-serif-4
    - geekbench
    - ghostty
    - gnucash
    - google-chrome
    - grandperspective
    - handbrake
    - istat-menus
    - karabiner-elements
    - keka
    - kekaexternalhelper
    - keyboard-maestro
    - keycastr
    - libreoffice
    - lm-studio
    - obsidian
    - popclip
    - prowritingaid
    - qlmarkdown
    - rectangle-pro
    - slack
    - spokenly
    - steermouse
    - sf-symbols
    - thaw
    - vlc
    - xurl
    - zed
    - zoom
  failed_when: false
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

- name: "package: Install global npm packages"
  ansible.builtin.command: npm install -g {{ item }}
  changed_when: false
  loop:
    - "@aikidosec/safe-chain"
    - ctx7
    - "@playwright/mcp@latest"
    - skills
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

- name: "package : Install package by uv"
  ansible.builtin.command: uv tool install {{ item }}
  changed_when: false
  loop:
    - pdfplumber
    - tavily-cli
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

# Note: If this task fails with "sudo: a terminal is required to read the password" error,
# some casks require sudo password for upgrade. In such cases, run `brew upgrade` manually
# in the terminal.
- name: "package : Upgrade all homebrew packages"
  community.general.homebrew:
    upgrade_all: true
  tags:
    - darwin
    - upgrade
    - package
    - darwin_package
    - darwin_package_upgrade

- name: "package : Remove invalid npm global package-lock file"
  ansible.builtin.file:
    path: /opt/homebrew/lib/node_modules/.package-lock.json
    state: absent
    mode: '0644'
  failed_when: false
  tags:
    - darwin
    - upgrade
    - package
    - darwin_package
    - darwin_package_upgrade

- name: "package : Update npm"
  ansible.builtin.command: npm install -g npm@latest
  changed_when: false
  tags:
    - ubuntu
    - upgrade
    - package
    - ubuntu_package
    - ubuntu_package_upgrade

- name: "package : Update global npm packages"
  ansible.builtin.command: npm update -g
  changed_when: false
  tags:
    - darwin
    - upgrade
    - package
    - darwin_package
    - darwin_package_upgrade

- name: "package : Upgrade all uv tools"
  ansible.builtin.command: uv tool upgrade --all
  changed_when: false
  tags:
    - darwin
    - upgrade
    - package
    - darwin_package
    - darwin_package_upgrade

# Note: mas 6+ requires root privileges to install App Store apps, so this task
# needs become. Run the playbook with -K or --ask-become-pass.
- name: "package : Install packages by mas"
  ansible.builtin.command: mas install {{ item }}
  become: true
  changed_when: false
  loop:
    - 302584613   # Amazon Kindle
    - 545519333   # Amazon Prime Video
    - 1168254295  # AmorphousDiskMark
    - 425264550   # Blackmagic Disk Speed Test
    - 1044629456  # GFXBench Metal
    - 1099568401  # Home Assistant
    - 539883307   # LINE
    - 1436994560  # Portal
    - 1187772509  # stts
    - 899247664   # TestFlight
    - 494803304   # WiFi Explorer
    - 1295203466  # Windows App
    - 1451685025  # WireGuard
    - 497799835   # Xcode
    - 1380563956  # 辞書 by 物書堂
  failed_when: false
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

- name: "font : Create directory"
  ansible.builtin.file:
    path: /Library/Fonts/Adobe
    state: directory
    mode: '0755'
  tags:
    - darwin
    - init
    - font
    - darwin_font
    - darwin_font_init

- name: "font : Download source-han-mono"
  ansible.builtin.get_url:
    url: https://github.com/adobe-fonts/source-han-mono/releases/download/{{ darwin_source_han_mono_version }}/SourceHanMono.ttc
    dest: /Library/Fonts/Adobe
    mode: '0644'
  tags:
    - darwin
    - install
    - font
    - darwin_font
    - darwin_font_install
    - darwin_font_download

- name: "font : Download source-han-sans"
  ansible.builtin.unarchive:
    src: https://github.com/adobe-fonts/source-han-sans/releases/download/{{ darwin_source_han_sans_version }}/SourceHanSans.ttc.zip
    dest: /Library/Fonts/Adobe
    remote_src: true
  tags:
    - darwin
    - install
    - font
    - darwin_font
    - darwin_font_install
    - darwin_font_download

- name: "font : Download source-han-serif"
  ansible.builtin.unarchive:
    src: https://github.com/adobe-fonts/source-han-serif/releases/download/{{ darwin_source_han_serif_version }}/01_SourceHanSerif.ttc.zip
    dest: /Library/Fonts/Adobe
    remote_src: true
  tags:
    - darwin
    - install
    - font
    - darwin_font
    - darwin_font_install
    - darwin_font_download

- name: "security : Download Aikido Safe Chain installer"
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/AikidoSec/safe-chain/main/install-scripts/install-safe-chain.sh
    dest: /tmp/install-safe-chain.sh
    mode: '0755'
  tags:
    - darwin
    - install
    - security
    - darwin_security
    - darwin_security_install

- name: "security : Install Aikido Safe Chain"
  ansible.builtin.command: sh /tmp/install-safe-chain.sh --include-python
  changed_when: false
  tags:
    - darwin
    - install
    - security
    - darwin_security
    - darwin_security_install

- name: "package : Install PowerShell by dotnet"
  ansible.builtin.command: dotnet tool install --global PowerShell
  changed_when: false
  tags:
    - darwin
    - install
    - package
    - darwin_package
    - darwin_package_install

# Note: This task requires sudo password. Run the playbook with -K or --ask-become-pass option.
# Example: ansible-playbook darwin-personal.yml --ask-become-pass
- name: "path : Copy path configurations"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/paths.d/{{ item }}
    mode: '0644'
  become: true
  loop:
    - homebrew
    - local
  failed_when: false
  tags:
    - darwin
    - config
    - path
    - darwin_path
    - darwin_path_config

- name: "xurl : Configure X API authentication"
  ansible.builtin.command:
    cmd: >
      xurl auth apps add kiro-rewse
      --client-id "{{ lookup('pipe', 'op read op://ansible/X/username') }}"
      --client-secret "{{ lookup('pipe', 'op read op://ansible/X/credential') }}"
    creates: ~/.xurl
  tags:
    - darwin
    - config
    - xurl
    - darwin_xurl
    - darwin_xurl_config
