---
# Use loop instead of passing a list to name: so that a failure on one package
# does not abort the others. With a list, the module processes packages in order
# and stops at the first failure, leaving the rest uninstalled.
- name: "package : Install packages by homebrew"
  community.general.homebrew:
    name: "{{ item }}"
    update_homebrew: false
  loop:
    - vips
  tags:
    - darwin
    - darwin_personal
    - install
    - package
    - darwin_package
    - darwin_package_install

# Use loop for the same reason as the homebrew task above: a list aborts at the
# first failing cask, which is common when an app already exists at the target
# path, leaving the rest uninstalled.
- name: "package : Install packages by homebrew_cask"
  community.general.homebrew_cask:
    name: "{{ item }}"
    update_homebrew: false
  loop:
    - charles
    - deepl
    - fantastical
    - epic-games
    - gog-galaxy
    - google-cloud-sdk
    - kiro
    - kiro-cli
    - origin
    - microsoft-office
    - raspberry-pi-imager
    - sony-ps-remote-play
    - steam
    - steelseries-gg
    - ticktick
  failed_when: false
  tags:
    - darwin
    - darwin_personal
    - install
    - package
    - darwin_package
    - darwin_package_install

- name: "claude: Download Claude Code installer"
  ansible.builtin.get_url:
    url: https://claude.ai/install.sh
    dest: /tmp/claude-install.sh
    mode: '0755'
  tags:
    - darwin
    - install
    - claude
    - darwin_claude
    - darwin_claude_install

- name: "claude: Install Claude Code"
  ansible.builtin.command: bash /tmp/claude-install.sh
  args:
    creates: ~/.local/bin/claude
  tags:
    - darwin
    - install
    - claude
    - darwin_claude
    - darwin_claude_install
