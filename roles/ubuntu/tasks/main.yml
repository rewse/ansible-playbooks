---
- name: "ubuntu : Set deb architecture fact"
  ansible.builtin.set_fact:
    ubuntu_deb_arch: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
  tags:
    - ubuntu
    - always

- name: "ubuntu : Set timezone to Asia/Tokyo"
  community.general.timezone:
    name: Asia/Tokyo
  tags:
    - ubuntu
    - config
    - timezone
    - ubuntu_ubuntu
    - ubuntu_ubuntu_config

- name: "ubuntu : Install apt repository management dependency"
  ansible.builtin.apt:
    name: python3-debian
    update_cache: true
  tags:
    - ubuntu
    - install
    - ubuntu_ubuntu
    - ubuntu_ubuntu_install

- name: "github : Download apt GPG key"
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: '0644'
  tags:
    - ubuntu
    - install
    - github
    - ubuntu_github
    - ubuntu_github_install
    - ubuntu_github_download

- name: "github : Add apt repository"
  ansible.builtin.deb822_repository:
    name: github-cli
    types: deb
    uris: https://cli.github.com/packages
    suites: stable
    components: main
    architectures: "{{ ubuntu_deb_arch }}"
    signed_by: /etc/apt/keyrings/githubcli-archive-keyring.gpg
  when: ansible_facts["architecture"] in ["x86_64", "aarch64"]
  tags:
    - ubuntu
    - install
    - github
    - ubuntu_github
    - ubuntu_github_install
    - ubuntu_github_config

- name: "github : Remove legacy apt list"
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/github-cli.list
    state: absent
  tags:
    - ubuntu
    - install
    - github
    - ubuntu_github
    - ubuntu_github_install
    - ubuntu_github_config

- name: "1password : Download GPG key"
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /tmp/1password.asc
    mode: '0644'
  tags:
    - ubuntu
    - install
    - 1password
    - ubuntu_1password
    - ubuntu_1password_install
    - ubuntu_1password_download

- name: "1password : Dearmor GPG key for apt"
  ansible.builtin.shell: gpg --dearmor < /tmp/1password.asc > /usr/share/keyrings/1password-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/1password-archive-keyring.gpg
  tags:
    - ubuntu
    - install
    - 1password
    - ubuntu_1password
    - ubuntu_1password_install
    - ubuntu_1password_config

- name: "1password : Add apt repository"
  ansible.builtin.deb822_repository:
    name: 1password
    types: deb
    uris: "https://downloads.1password.com/linux/debian/{{ ubuntu_deb_arch }}"
    suites: stable
    components: main
    architectures: "{{ ubuntu_deb_arch }}"
    signed_by: /usr/share/keyrings/1password-archive-keyring.gpg
  tags:
    - ubuntu
    - install
    - 1password
    - ubuntu_1password
    - ubuntu_1password_install
    - ubuntu_1password_config

- name: "1password : Remove legacy apt list"
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/1password.list
    state: absent
  tags:
    - ubuntu
    - install
    - 1password
    - ubuntu_1password
    - ubuntu_1password_install
    - ubuntu_1password_config

- name: "1password : Create debsig policies directory"
  ansible.builtin.file:
    path: /etc/debsig/policies/AC2D62742012EA22
    state: directory
    mode: '0755'
  tags:
    - ubuntu
    - install
    - 1password
    - ubuntu_1password
    - ubuntu_1password_install
    - ubuntu_1password_init

- name: "1password : Download debsig policy"
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/debian/debsig/1password.pol
    dest: /etc/debsig/policies/AC2D62742012EA22/1password.pol
    mode: '0644'
  tags:
    - ubuntu
    - install
    - 1password
    - ubuntu_1password
    - ubuntu_1password_install
    - ubuntu_1password_download

- name: "1password : Create debsig keyrings directory"
  ansible.builtin.file:
    path: /usr/share/debsig/keyrings/AC2D62742012EA22
    state: directory
    mode: '0755'
  tags:
    - ubuntu
    - install
    - 1password
    - ubuntu_1password
    - ubuntu_1password_install
    - ubuntu_1password_init

- name: "1password : Dearmor GPG key for debsig"
  ansible.builtin.shell: gpg --dearmor < /tmp/1password.asc > /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
  args:
    creates: /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
  tags:
    - ubuntu
    - install
    - 1password
    - ubuntu_1password
    - ubuntu_1password_install
    - ubuntu_1password_config

- name: "ubuntu : Update all packages"
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  tags:
    - ubuntu
    - update
    - ubuntu_ubuntu
    - ubuntu_ubuntu_update

- name: "ubuntu : Install packages"
  ansible.builtin.apt:
    name:
      - 1password-cli
      - ansible
      - ansible-lint
      - apt-file
      - at
      - bat
      - bc
      - curl
      - direnv
      - dphys-swapfile
      - dnsutils
      - etckeeper
      - fail2ban
      - gh
      - git
      - irqbalance
      - libsasl2-modules
      - libwww-perl
      - locales-all
      - logwatch
      - iw
      - mailutils
      - ncdu
      - net-tools
      - postfix
      - python3-pip
      - python3-venv
      - sysstat
      - tldr
      - tree
      - unattended-upgrades
      - unzip
      - update-notifier-common
      - vim
      - wireless-tools
      - zsh
  tags:
    - ubuntu
    - install
    - ubuntu_ubuntu
    - ubuntu_ubuntu_install

- name: "awscliv2 : Check installation status"
  ansible.builtin.stat:
    path: /usr/local/bin/aws
  register: ubuntu_aws
  tags:
    - ubuntu
    - install
    - awscliv2
    - ubuntu_awscliv2
    - ubuntu_awscliv2_install

- name: "awscliv2 : Download and extract"
  ansible.builtin.unarchive:
    src: https://awscli.amazonaws.com/awscli-exe-linux-{{ ansible_facts["architecture"] }}.zip
    dest: /usr/local/src
    remote_src: true
  when: not ubuntu_aws.stat.exists
  tags:
    - ubuntu
    - install
    - awscliv2
    - ubuntu_awscliv2
    - ubuntu_awscliv2_install
    - ubuntu_awscliv2_download

- name: "awscliv2 : Install"
  ansible.builtin.command: /usr/local/src/aws/install
  changed_when: true
  when: not ubuntu_aws.stat.exists
  tags:
    - ubuntu
    - install
    - awscliv2
    - ubuntu_awscliv2
    - ubuntu_awscliv2_install

- name: "awscliv2 : Update"
  ansible.builtin.command: /usr/local/src/aws/install --update
  changed_when: false
  when: ubuntu_aws.stat.exists
  tags:
    - ubuntu
    - update
    - awscliv2
    - ubuntu_awscliv2
    - ubuntu_awscliv2_update

- name: "kiro-cli : Download installer"
  ansible.builtin.get_url:
    url: https://cli.kiro.dev/install
    dest: /tmp/kiro-cli-install.sh
    mode: '0755'
  tags:
    - ubuntu
    - install
    - kiro-cli
    - ubuntu_kiro-cli

- name: "kiro-cli : Install"
  ansible.builtin.command: bash /tmp/kiro-cli-install.sh
  args:
    creates: /root/.local/bin/kiro-cli
  tags:
    - ubuntu
    - install
    - kiro-cli
    - ubuntu_kiro-cli
    - ubuntu_kiro-cli_install

- name: "kiro-cli : Create symlinks in /usr/local/bin"
  ansible.builtin.file:
    src: /root/.local/bin/{{ item }}
    dest: /usr/local/bin/{{ item }}
    state: link
  loop:
    - kiro-cli
    - kiro-cli-chat
    - kiro-cli-term
  tags:
    - ubuntu
    - install
    - kiro-cli
    - ubuntu_kiro-cli
    - ubuntu_kiro-cli_install
    - ubuntu_kiro-cli_init

- name: "kiro-cli : Update"
  ansible.builtin.command: /usr/local/bin/kiro-cli update
  changed_when: false
  tags:
    - ubuntu
    - update
    - kiro-cli
    - ubuntu_kiro-cli
    - ubuntu_kiro-cli_update

- name: "uv : Download installer"
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: '0755'
  tags:
    - ubuntu
    - install

- name: "uv : Install"
  ansible.builtin.command: sh /tmp/uv-install.sh
  args:
    creates: /usr/local/bin/uv
  environment:
    UV_INSTALL_DIR: /usr/local/bin
  tags:
    - ubuntu
    - install
    - uv
    - ubuntu_uv
    - ubuntu_uv_install

- name: "uv : Update"
  ansible.builtin.command: /usr/local/bin/uv self update
  changed_when: false
  tags:
    - ubuntu
    - update
    - uv
    - ubuntu_uv
    - ubuntu_uv_update

- name: "uv : Install package by uv"
  ansible.builtin.command: uv tool install {{ item }}
  changed_when: false
  loop:
    - pdfplumber
    - tavily-cli
  tags:
    - ubuntu
    - install
    - package
    - ubuntu_package
    - ubuntu_package_install

- name: "uv : Upgrade all uv tools"
  ansible.builtin.command: uv tool upgrade --all
  changed_when: false
  tags:
    - ubuntu
    - upgrade
    - package
    - ubuntu_package
    - ubuntu_package_upgrade

- name: "zinit : Install"
  ansible.builtin.shell: bash -c "$(curl --fail --show-error --silent --location https://raw.githubusercontent.com/zdharma-continuum/zinit/HEAD/scripts/install.sh)"
  args:
    creates: /root/.local/share/zinit/zinit.git
  environment:
    NO_INPUT: "1"
  tags:
    - ubuntu
    - install
    - zinit
    - ubuntu_zinit
    - ubuntu_zinit_install

- name: "zinit : Create symlink in /usr/local/share"
  ansible.builtin.file:
    src: /root/.local/share/zinit
    dest: /usr/local/share/zinit
    state: link
  tags:
    - ubuntu
    - install
    - zinit
    - ubuntu_zinit
    - ubuntu_zinit_install
    - ubuntu_zinit_init

- name: "zinit : Update"
  ansible.builtin.command: zsh -ic "zinit self-update"
  changed_when: false
  tags:
    - ubuntu
    - update
    - zinit
    - ubuntu_zinit
    - ubuntu_zinit_update

- name: "etckeeper : Initialize /etc"
  ansible.builtin.command: etckeeper init
  args:
    creates: /etc/.git
  tags:
    - ubuntu
    - init
    - etckeeper
    - ubuntu_etckeeper
    - ubuntu_etckeeper_init

- name: "etckeeper : Create initial commit"
  ansible.builtin.command: etckeeper commit "Initial commit"
  args:
    chdir: /etc
    creates: /etc/.git/logs
  tags:
    - ubuntu
    - init
    - etckeeper
    - ubuntu_etckeeper
    - ubuntu_etckeeper_init

- name: "ubuntu : Set hostname"
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  tags:
    - ubuntu
    - config
    - hostname
    - ubuntu_ubuntu
    - ubuntu_ubuntu_config

- name: "cloud-init : Enable preserve_hostname"
  ansible.builtin.lineinfile:
    dest: /etc/cloud/cloud.cfg
    regexp: '^preserve_hostname'
    line: 'preserve_hostname: true'
  tags:
    - ubuntu
    - config
    - cloud-init
    - ubuntu_cloud-init
    - ubuntu_cloud-init_config

- name: "inputrc : Set editing-mode to vi"
  ansible.builtin.lineinfile:
    dest: /etc/inputrc
    regexp: 'set editing-mode '
    line: 'set editing-mode vi'
  tags:
    - ubuntu
    - config
    - inputrc
    - ubuntu_inputrc
    - ubuntu_inputrc_config

- name: "user : Create admin group"
  ansible.builtin.group:
    name: "{{ admin }}"
    gid: 2000
  tags:
    - ubuntu
    - config
    - user
    - ubuntu_user
    - ubuntu_user_config
    - ubuntu_user_init

- name: "user : Create admin user"
  ansible.builtin.user:
    name: "{{ admin }}"
    uid: 2000
    group: "{{ admin }}"
    groups: "adm,sudo"
    shell: /usr/bin/zsh
    skeleton: /etc/skel
  tags:
    - ubuntu
    - config
    - user
    - ubuntu_user
    - ubuntu_user_config
    - ubuntu_user_init

- name: "user : Configure passwordless sudo for admin"
  ansible.builtin.lineinfile:
    dest: /etc/sudoers.d/00-{{ admin }}
    regexp: '^{{ admin }}'
    line: '{{ admin }} ALL=(ALL) NOPASSWD: ALL'
    create: true
    mode: '0440'
    validate: 'visudo -cf %s'
  tags:
    - ubuntu
    - config
    - user
    - ubuntu_user
    - ubuntu_user_config

- name: "user : Create .ssh directory for admin"
  ansible.builtin.file:
    path: /home/{{ admin }}/.ssh
    owner: "{{ admin }}"
    group: "{{ admin }}"
    state: directory
    mode: '0700'
  tags:
    - ubuntu
    - config
    - user
    - ubuntu_user
    - ubuntu_user_config
    - ubuntu_user_init

- name: "ssh : Copy authentication.conf"
  ansible.builtin.copy:
    src: authentication.conf
    dest: /etc/ssh/sshd_config.d
    mode: '0644'
  notify: "ssh: Restart"
  tags:
    - ubuntu
    - config
    - ssh
    - ubuntu_ssh
    - ubuntu_ssh_config

- name: "user : Copy authorized_keys for admin"
  ansible.builtin.copy:
    src: /home/ubuntu/.ssh/authorized_keys
    dest: /home/{{ admin }}/.ssh/authorized_keys
    remote_src: true
    owner: "{{ admin }}"
    group: "{{ admin }}"
    mode: '0600'
  tags:
    - ubuntu
    - config
    - user
    - ubuntu_user
    - ubuntu_user_config

- name: "fail2ban : Copy jail.local"
  ansible.builtin.copy:
    src: jail.local
    dest: /etc/fail2ban/jail.local
    mode: '0644'
  notify: "fail2ban: Restart"
  tags:
    - ubuntu
    - config
    - fail2ban
    - ubuntu_fail2ban
    - ubuntu_fail2ban_config

- name: "fail2ban : Copy sshd jail config"
  ansible.builtin.template:
    src: sshd.conf.j2
    dest: /etc/fail2ban/jail.d/sshd.conf
    mode: '0644'
  notify: "fail2ban: Restart"
  tags:
    - ubuntu
    - config
    - fail2ban
    - ubuntu_fail2ban
    - ubuntu_fail2ban_config

- name: "fail2ban : Copy couchdb filter"
  ansible.builtin.copy:
    src: couchdb-filter.conf
    dest: /etc/fail2ban/filter.d/couchdb.conf
    mode: '0644'
  notify: "fail2ban: Restart"
  tags:
    - ubuntu
    - config
    - fail2ban
    - ubuntu_fail2ban
    - ubuntu_fail2ban_config

- name: "fail2ban : Copy couchdb jail config"
  ansible.builtin.copy:
    src: couchdb.conf
    dest: /etc/fail2ban/jail.d/couchdb.conf
    mode: '0644'
  notify: "fail2ban: Restart"
  tags:
    - ubuntu
    - config
    - fail2ban
    - ubuntu_fail2ban
    - ubuntu_fail2ban_config

- name: "fail2ban : Copy homeassistant filter"
  ansible.builtin.copy:
    src: homeassistant-filter.conf
    dest: /etc/fail2ban/filter.d/homeassistant.conf
    mode: '0644'
  notify: "fail2ban: Restart"
  tags:
    - ubuntu
    - config
    - fail2ban
    - ubuntu_fail2ban
    - ubuntu_fail2ban_config

- name: "fail2ban : Copy homeassistant jail config"
  ansible.builtin.copy:
    src: homeassistant.conf
    dest: /etc/fail2ban/jail.d/homeassistant.conf
    mode: '0644'
  notify: "fail2ban: Restart"
  tags:
    - ubuntu
    - config
    - fail2ban
    - ubuntu_fail2ban
    - ubuntu_fail2ban_config

- name: "fail2ban : Copy zabbix-web filter"
  ansible.builtin.copy:
    src: zabbix-web-filter.conf
    dest: /etc/fail2ban/filter.d/zabbix-web.conf
    mode: '0644'
  notify: "fail2ban: Restart"
  tags:
    - ubuntu
    - config
    - fail2ban
    - ubuntu_fail2ban
    - ubuntu_fail2ban_config

- name: "fail2ban : Copy zabbix-web jail config"
  ansible.builtin.copy:
    src: zabbix-web.conf
    dest: /etc/fail2ban/jail.d/zabbix-web.conf
    mode: '0644'
  notify: "fail2ban: Restart"
  tags:
    - ubuntu
    - config
    - fail2ban
    - ubuntu_fail2ban
    - ubuntu_fail2ban_config

- name: "failure-notify : Copy script"
  ansible.builtin.template:
    src: failure-notify.j2
    dest: /usr/local/sbin/failure-notify
    mode: '0755'
  tags:
    - ubuntu
    - config
    - failure-notify
    - ubuntu_failure-notify
    - ubuntu_failure-notify_config

- name: "failure-notify : Copy service"
  ansible.builtin.copy:
    src: failure-notify@.service
    dest: /etc/systemd/system/failure-notify@.service
    mode: '0644'
  notify: "Reload systemd"
  tags:
    - ubuntu
    - config
    - failure-notify
    - ubuntu_failure-notify
    - ubuntu_failure-notify_config

# Ref: https://ghostty.org/docs/help/terminfo
- name: "ghostty : Copy terminfo"
  ansible.builtin.copy:
    src: xterm-ghostty
    dest: /usr/share/terminfo/x/xterm-ghostty
    mode: '0644'
  tags:
    - ubuntu
    - install
    - ghostty
    - ubuntu_ghostty
    - ubuntu_ghostty_install
    - ubuntu_ghostty_config

- name: "ghostty : Create symlink"
  ansible.builtin.file:
    src: ../x/xterm-ghostty
    dest: /usr/share/terminfo/g/ghostty
    state: link
  tags:
    - ubuntu
    - install
    - ghostty
    - ubuntu_ghostty
    - ubuntu_ghostty_install
    - ubuntu_ghostty_init

- name: "skills : Install"
  ansible.builtin.command: npm install -g skills
  changed_when: false
  tags:
    - ubuntu
    - install
    - skills
    - ubuntu_skills
    - ubuntu_skills_install

- name: "agent-browser : Install"
  ansible.builtin.command: npm install -g agent-browser
  changed_when: false
  tags:
    - ubuntu
    - install
    - agent-browser
    - ubuntu_agent-browser
    - ubuntu_agent-browser_install

- name: "lightpanda : Set download architecture"
  ansible.builtin.set_fact:
    ubuntu_lightpanda_arch: "{{ ansible_facts['architecture'] | replace('x86_64', 'x86_64') | replace('aarch64', 'aarch64') }}"
  tags:
    - ubuntu
    - install
    - lightpanda
    - always

- name: "lightpanda : Download binary"
  ansible.builtin.get_url:
    url: "https://github.com/lightpanda-io/browser/releases/download/{{ ubuntu_lightpanda_version }}/lightpanda-{{ ubuntu_lightpanda_arch }}-linux"
    dest: /usr/local/bin/lightpanda
    mode: '0755'
  tags:
    - ubuntu
    - install
    - lightpanda
    - ubuntu_lightpanda
    - ubuntu_lightpanda_install

- name: "package : Update global npm packages"
  ansible.builtin.command: npm update -g
  changed_when: false
  tags:
    - ubuntu
    - upgrade
    - package
    - ubuntu_package
    - ubuntu_package_upgrade
