---
- name: "package : Install packages"
  ansible.builtin.apt:
    name:
      - bluez
      - fuse3
      - ifmetric
      - mosquitto-clients
      - nfs-common
      - pi-bluetooth
      - snmp
      - snmp-mibs-downloader
  tags:
    - raspberrypi
    - install
    - raspberrypi_package
    - raspberrypi_package_install

- name: "claude: Download Claude Code installer"
  ansible.builtin.get_url:
    url: https://claude.ai/install.sh
    dest: /tmp/claude-install.sh
    mode: '0755'
  tags:
    - raspberrypi
    - install
    - claude

- name: "claude: Install Claude Code"
  ansible.builtin.command: bash /tmp/claude-install.sh
  args:
    creates: ~/.local/bin/claude
  tags:
    - raspberrypi
    - install
    - claude
    - raspberrypi_claude
    - raspberrypi_claude_install

- name: "claude: Create symlink to /usr/local/bin"
  ansible.builtin.file:
    src: ~/.local/bin/claude
    dest: /usr/local/bin/claude
    state: link
  become: true
  tags:
    - raspberrypi
    - install
    - claude
    - raspberrypi_claude
    - raspberrypi_claude_install

- name: "swap : Set swap factor to RAM size"
  ansible.builtin.lineinfile:
    path: /etc/dphys-swapfile
    regexp: '^#?CONF_SWAPFACTOR='
    line: 'CONF_SWAPFACTOR=1'
    backup: true
  notify: "dphys-swapfile: Restart"
  tags:
    - raspberrypi
    - config
    - swap
    - raspberrypi_swap
    - raspberrypi_swap_config

- name: "swap : Set swap max size to 16GB"
  ansible.builtin.lineinfile:
    path: /etc/dphys-swapfile
    regexp: '^#?CONF_MAXSWAP='
    line: 'CONF_MAXSWAP=16384'
    backup: true
  notify: "dphys-swapfile: Restart"
  tags:
    - raspberrypi
    - config
    - swap
    - raspberrypi_swap
    - raspberrypi_swap_config

- name: "swap : Disable fixed swap size for dynamic calculation"
  ansible.builtin.lineinfile:
    path: /etc/dphys-swapfile
    regexp: '^CONF_SWAPSIZE='
    line: '#CONF_SWAPSIZE='
    backup: true
  notify: "dphys-swapfile: Restart"
  tags:
    - raspberrypi
    - config
    - swap
    - raspberrypi_swap
    - raspberrypi_swap_config

- name: "ntp : Configure NTP servers"
  ansible.builtin.lineinfile:
    dest: /etc/systemd/timesyncd.conf
    insertafter: '^#NTP='
    regexp: '^NTP='
    line: 'NTP=ntp.nict.jp ntp.jst.mfeed.ad.jp'
  notify: "systemd-timesyncd: Restart"
  tags:
    - raspberrypi
    - config
    - time
    - raspberrypi_ntp
    - raspberrypi_ntp_config

- name: "bluetooth : Enable service"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - bluetooth
  tags:
    - raspberrypi
    - config
    - raspberrypi_bluetooth
    - raspberrypi_bluetooth_config

- name: "snmp : Enable MIBs"
  ansible.builtin.lineinfile:
    dest: /etc/snmp/snmp.conf
    regexp: "mibs "
    line: "mibs all"
  tags:
    - raspberrypi
    - config
    - raspberrypi_snmp
    - raspberrypi_snmp_config

- name: "php-miio : Clone repository"
  ansible.builtin.git:
    repo: https://github.com/skysilver-lab/php-miio.git
    dest: /srv/php-miio
    version: "v.{{ raspberrypi_php_miio_version }}"
  register: raspberrypi_php_miio_git
  tags:
    - raspberrypi
    - install
    - raspberrypi_php-miio
    - raspberrypi_php-miio_install

- name: "environment : Copy file"
  ansible.builtin.copy:
    src: environment
    dest: /etc
    mode: '0644'
  tags:
    - raspberrypi
    - config
    - raspberrypi_environment
    - raspberrypi_environment_config

- name: "nvme : Disable runtime power management via udev"
  ansible.builtin.copy:
    src: 99-nvme-power.rules
    dest: /etc/udev/rules.d
    mode: "0644"
  when: ansible_facts['devices']['nvme0n1'] is defined
  notify: "udev: Reload rules"
  tags:
    - raspberrypi
    - config
    - raspberrypi_nvme
    - raspberrypi_nvme_config

- name: "boot : Configure NVMe power management workaround"
  ansible.builtin.lineinfile:
    path: /boot/firmware/cmdline.txt
    regexp: '^(.*)$'
    line: '\1 nvme_core.default_ps_max_latency_us=0 pcie_aspm=off pcie_port_pm=off'
  when: ansible_facts['devices']['nvme0n1'] is defined
  tags:
    - raspberrypi
    - config
    - boot
    - raspberrypi_boot
    - raspberrypi_boot_config

- name: "netplan : Configure network"
  ansible.builtin.template:
    src: 99-config.yaml.j2
    dest: /etc/netplan/99-config.yaml
    mode: '0600'
  tags:
    - raspberrypi
    - config
    - raspberrypi_netplan
    - raspberrypi_netplan_config

- name: "netplan : Remove cloud-init config"
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent
    mode: '0644'
  tags:
    - raspberrypi
    - config
    - raspberrypi_netplan
    - raspberrypi_netplan_config

- name: "cloud-init : Disable network config"
  ansible.builtin.copy:
    src: 99-disable-network-config.cfg
    dest: /etc/cloud/cloud.cfg.d
    mode: '0644'
  tags:
    - raspberrypi
    - config
    - raspberrypi_cloud-init
    - raspberrypi_cloud-init_config

- name: "sysctl : Configure for VPN"
  ansible.builtin.copy:
    src: 90-vpn.conf
    dest: /etc/sysctl.d
    mode: '0644'
  notify: "sysctl: Reload"
  tags:
    - raspberrypi
    - config
    - raspberrypi_sysctl
    - raspberrypi_sysctl_config

- name: "sysctl : Configure for multi NIC"
  ansible.builtin.copy:
    src: 99-arp-multinic.conf
    dest: /etc/sysctl.d
    mode: '0644'
  notify: "sysctl: Reload"
  tags:
    - raspberrypi
    - config
    - raspberrypi_sysctl
    - raspberrypi_sysctl_config

- name: "network-failover : Copy script"
  ansible.builtin.copy:
    src: network-failover
    dest: /usr/local/sbin
    mode: '0755'
  tags:
    - raspberrypi
    - config
    - raspberrypi_network-failover
    - raspberrypi_network-failover_config

- name: "network-failover : Copy service"
  ansible.builtin.copy:
    src: network-failover.service
    dest: /etc/systemd/system
    mode: '0644'
  notify: "Reload systemd"
  tags:
    - raspberrypi
    - config
    - raspberrypi_network-failover
    - raspberrypi_network-failover_config

- name: "network-failover : Copy timer"
  ansible.builtin.copy:
    src: network-failover.timer
    dest: /etc/systemd/system
    mode: '0644'
  notify: "network-failover: Restart timer"
  tags:
    - raspberrypi
    - config
    - raspberrypi_network-failover
    - raspberrypi_network-failover_config

- name: "network-failover : Enable and start timer"
  ansible.builtin.systemd:
    name: network-failover.timer
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - raspberrypi
    - config
    - raspberrypi_network-failover
    - raspberrypi_network-failover_config

- name: "netplan : Apply configuration"
  ansible.builtin.command: netplan apply
  changed_when: false
  tags:
    - raspberrypi
    - config
    - raspberrypi_netplan
    - raspberrypi_netplan_config

- name: "netplan : Wait for network to be reachable"
  ansible.builtin.wait_for:
    host: 1.1.1.1
    port: 53
    timeout: 30
  tags:
    - raspberrypi
    - config
    - raspberrypi_netplan
    - raspberrypi_netplan_config

# ssh stuck at expecting SSH2_MSG_KEX_ECDH_REPLY - Unix & Linux Stack Exchange
# https://unix.stackexchange.com/questions/722954/ssh-stuck-at-expecting-ssh2-msg-kex-ecdh-reply
- name: "ssh : Configure KEX algorithms"
  ansible.builtin.copy:
    src: kex_algorithms.conf
    dest: /etc/ssh/ssh_config.d
    mode: '0644'
  tags:
    - raspberrypi
    - config
    - ssh
    - raspberrypi_ssh
    - raspberrypi_ssh_config

- name: "ssh : Create socket override directory"
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.socket.d
    state: directory
    mode: '0755'
  tags:
    - raspberrypi
    - config
    - ssh
    - raspberrypi_ssh
    - raspberrypi_ssh_init

- name: "ssh : Configure socket override"
  ansible.builtin.template:
    src: override.conf.j2
    dest: /etc/systemd/system/ssh.socket.d/override.conf
    mode: '0644'
  notify:
    - "Reload systemd"
    - "ssh: Restart socket"
  tags:
    - raspberrypi
    - config
    - ssh
    - raspberrypi_ssh
    - raspberrypi_ssh_config

- name: "qwen-code : Install"
  community.general.npm:
    name: "@qwen-code/qwen-code@latest"
    global: true
    state: present
  tags:
    - raspberrypi
    - install
    - qwen-code
    - raspberrypi_qwen-code
    - raspberrypi_qwen-code_install

- name: "backup : Create mount point"
  ansible.builtin.file:
    path: /mnt/bak
    state: directory
    mode: '0755'
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_init

- name: "backup : Check installed restic version"
  ansible.builtin.command: restic version
  register: raspberrypi_restic_installed
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - raspberrypi
    - install
    - raspberrypi_backup
    - raspberrypi_backup_install

- name: "backup : Download restic binary archive"
  ansible.builtin.get_url:
    url: "https://github.com/restic/restic/releases/download/v{{ raspberrypi_restic.version }}/restic_{{ raspberrypi_restic.version }}_linux_{{ restic_arch }}.bz2"
    dest: "/tmp/restic_{{ raspberrypi_restic.version }}_linux_{{ restic_arch }}.bz2"
    mode: '0644'
  vars:
    restic_arch: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
  when: raspberrypi_restic.version not in (raspberrypi_restic_installed.stdout | default(''))
  tags:
    - raspberrypi
    - install
    - raspberrypi_backup
    - raspberrypi_backup_install

- name: "backup : Extract restic binary"
  ansible.builtin.shell: |
    bunzip2 -kc /tmp/restic_{{ raspberrypi_restic.version }}_linux_{{ restic_arch }}.bz2 > /usr/local/bin/restic
    chmod 755 /usr/local/bin/restic
  vars:
    restic_arch: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
  when: raspberrypi_restic.version not in (raspberrypi_restic_installed.stdout | default(''))
  changed_when: true
  tags:
    - raspberrypi
    - install
    - raspberrypi_backup
    - raspberrypi_backup_install

- name: "backup : Create password directory"
  ansible.builtin.file:
    path: /etc/restic
    state: directory
    mode: '0700'
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Install repository password"
  ansible.builtin.copy:
    content: "{{ raspberrypi_restic.password }}"
    dest: /etc/restic/password
    mode: '0600'
  no_log: true
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Copy exclusion list"
  ansible.builtin.copy:
    src: restic.exclude
    dest: /etc
    mode: '0644'
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Copy script"
  ansible.builtin.template:
    src: backup-daily.j2
    dest: /usr/local/sbin/backup-daily
    mode: '0755'
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Copy service"
  ansible.builtin.copy:
    src: backup-daily.service
    dest: /etc/systemd/system/backup-daily.service
    mode: '0644'
  notify: "Reload systemd"
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Copy timer"
  ansible.builtin.copy:
    src: backup-daily.timer
    dest: /etc/systemd/system/backup-daily.timer
    mode: '0644'
  notify: "raspberrypi : Restart backup-daily timer"
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Enable and start timer"
  ansible.builtin.systemd:
    name: backup-daily.timer
    enabled: true
    state: started
    daemon_reload: true
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Copy monthly check script"
  ansible.builtin.template:
    src: backup-monthly-check.j2
    dest: /usr/local/sbin/backup-monthly-check
    mode: '0755'
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Copy monthly check service"
  ansible.builtin.copy:
    src: backup-monthly-check.service
    dest: /etc/systemd/system/backup-monthly-check.service
    mode: '0644'
  notify: "Reload systemd"
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Copy monthly check timer"
  ansible.builtin.copy:
    src: backup-monthly-check.timer
    dest: /etc/systemd/system/backup-monthly-check.timer
    mode: '0644'
  notify: "raspberrypi : Restart backup-monthly-check timer"
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config

- name: "backup : Enable and start monthly check timer"
  ansible.builtin.systemd:
    name: backup-monthly-check.timer
    enabled: true
    state: started
    daemon_reload: true
  tags:
    - raspberrypi
    - config
    - raspberrypi_backup
    - raspberrypi_backup_config
