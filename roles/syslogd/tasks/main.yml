---
- name: "rsyslog : Copy remote logging config"
  ansible.builtin.copy:
    src: 10-remote.conf
    dest: /etc/rsyslog.d
    mode: '0644'
  notify: "rsyslog: Restart"
  tags:
    - syslogd
    - config
    - syslogd_rsyslog
    - syslogd_rsyslog_config

- name: "logrotate : Copy remote log rotation config"
  ansible.builtin.copy:
    src: remote
    dest: /etc/logrotate.d
    mode: '0644'
  notify: "logrotate: Restart"
  tags:
    - syslogd
    - config
    - logrotate
    - syslogd_logrotate
    - syslogd_logrotate_config
