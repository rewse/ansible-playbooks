UserParameter=homeassistant.sync.active[*],systemctl is-active homeassistant-sync.$1
UserParameter=homeassistant.sync.last_exit,systemctl show -p ExecMainStatus --value homeassistant-sync.service
UserParameter=homeassistant.failover.active[*],systemctl is-active homeassistant-failover.$1
UserParameter=homeassistant.failover.last_exit,systemctl show -p ExecMainStatus --value homeassistant-failover.service
UserParameter=homeassistant.failover.triggered[*],journalctl -u homeassistant-failover.service --since "$1 ago" --no-pager 2>/dev/null | grep -c "Triggering failover"
UserParameter=homeassistant.container.running,sudo docker inspect --format '{{.State.Running}}' homeassistant 2>/dev/null || echo false
