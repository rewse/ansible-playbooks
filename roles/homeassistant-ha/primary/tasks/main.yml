---
- name: "rsync-daemon : Install package"
  ansible.builtin.apt:
    name: rsync
  tags: [homeassistant-ha-primary, install]

- name: "rsync-daemon : Copy configuration"
  ansible.builtin.template:
    src: rsyncd.conf.j2
    dest: /etc/rsyncd.conf
    mode: '0644'
  notify: "rsync: Restart"
  tags: [homeassistant-ha-primary, config]

- name: "rsync-daemon : Enable and start service"
  ansible.builtin.systemd:
    name: rsync
    enabled: true
    state: started
  tags: [homeassistant-ha-primary, config]

- name: "rsync-daemon : Install logrotate config"
  ansible.builtin.copy:
    src: rsyncd.logrotate
    dest: /etc/logrotate.d/rsyncd
    mode: '0644'
  tags: [homeassistant-ha-primary, config]

- name: "zabbix : Copy userparameter config"
  ansible.builtin.template:
    src: homeassistant-ha.conf.j2
    dest: /etc/zabbix/zabbix_agentd.d/homeassistant-ha.conf
    mode: '0644'
    variable_start_string: "[%"
    variable_end_string: "%]"
  notify: "zabbix-agent: Restart"
  tags: [homeassistant-ha-primary, config]
