---
- name: "corretto : Download GPG key"
  ansible.builtin.get_url:
    url: https://apt.corretto.aws/corretto.key
    dest: /etc/apt/keyrings/corretto.key
    mode: '0644'
  tags: [database-client-gui, install, java]

- name: "corretto : Dearmor GPG key"
  ansible.builtin.command: gpg --dearmor -o /etc/apt/keyrings/corretto.gpg /etc/apt/keyrings/corretto.key
  args:
    creates: /etc/apt/keyrings/corretto.gpg
  tags: [database-client-gui, install, java]

- name: "corretto : Install apt repository management dependency"
  ansible.builtin.apt:
    name: python3-debian
    update_cache: true
  tags: [database-client-gui, install, java]

- name: "corretto : Add apt repository"
  ansible.builtin.deb822_repository:
    name: corretto
    types: deb
    uris: https://apt.corretto.aws
    suites: stable
    components: main
    signed_by: /etc/apt/keyrings/corretto.gpg
    state: present
  tags: [database-client-gui, install, java]

- name: "corretto : Remove legacy apt list"
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/corretto.list
    state: absent
  tags: [database-client-gui, install, java]

- name: "corretto : Update apt cache"
  ansible.builtin.apt:
    update_cache: true
  tags: [database-client-gui, install, java]

- name: "corretto : Install JDK"
  ansible.builtin.apt:
    name: java-{{ database_corretto_version }}-amazon-corretto-jdk
    state: present
  tags: [database-client-gui, install, java]

- name: "sct : Download and extract"
  ansible.builtin.unarchive:
    src: https://s3.amazonaws.com/publicsctdownload/Ubuntu/aws-schema-conversion-tool-1.0.latest.zip
    dest: /usr/local/src
    remote_src: true
  tags: [database-client-gui, install, sct]

- name: "sct : Install package"
  ansible.builtin.apt:
    deb: /usr/local/src/aws-schema-conversion-tool-{{ database_sct_version }}.deb
  tags: [database-client-gui, install, sct]

- name: "dbeaver : Install package"
  ansible.builtin.apt:
    deb: https://dbeaver.io/files/dbeaver-ce_latest_amd64.deb
  tags: [database-client-gui, install, dbeaver]
