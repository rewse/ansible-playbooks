---
- name: "mysql : Add apt repository"
  ansible.builtin.apt:
    deb: https://repo.mysql.com//mysql-apt-config_{{ database_mysql_apt_config_version }}_all.deb
  tags:
    - database-client
    - install
    - mysql
    - database-client_mysql
    - database-client_mysql_config

- name: "database-client : Install packages"
  ansible.builtin.apt:
    name:
      - mysql-client
      - postgresql-client
      - libpostgresql-jdbc-java
      - alien
      - rlwrap
  tags:
    - database-client
    - install
    - database-client_database-client
    - database-client_database-client_install

- name: "mysql : Install connector-j"
  ansible.builtin.apt:
    deb: https://cdn.mysql.com//Downloads/Connector-J/mysql-connector-j_{{ database_mysql_connector_version }}_all.deb
  tags:
    - database-client
    - install
    - mysql
    - database-client_mysql
    - database-client_mysql_install

- name: "oracle : Extract instantclient archives"
  ansible.builtin.unarchive:
    src: https://download.oracle.com/otn_software/linux/instantclient/{{ database_oracle_instantclient_version | replace('.', '') }}/instantclient-{{ item }}-linux.x64-{{ database_oracle_instantclient_version }}.zip
    dest: /srv
    remote_src: true
  loop:
    - basic
    - sqlplus
    - tools
  tags:
    - database-client
    - install
    - oracle
    - database-client_oracle
    - database-client_oracle_install

- name: "oracle : Add instantclient to PATH"
  ansible.builtin.template:
    src: oracle-instantclient.sh.j2
    dest: /etc/profile.d/oracle-instantclient.sh
    mode: '0644'
  tags:
    - database-client
    - config
    - oracle
    - database-client_oracle
    - database-client_oracle_config

- name: "oracle : Add instantclient to ld.so.conf"
  ansible.builtin.template:
    src: oracle-instantclient.conf.j2
    dest: /etc/ld.so.conf.d/oracle-instantclient.conf
    mode: '0644'
  tags:
    - database-client
    - config
    - oracle
    - database-client_oracle
    - database-client_oracle_config

- name: "oracle : Create symlink for ojdbc.jar"
  ansible.builtin.file:
    src: /srv/instantclient_{{ database_oracle_instantclient_version.split('.')[0] }}_{{ database_oracle_instantclient_version.split('.')[1] }}/ojdbc8.jar
    dest: /usr/share/java/ojdbc11.jar
    state: link
  tags:
    - database-client
    - config
    - oracle
    - database-client_oracle
    - database-client_oracle_init

- name: "oracle : Add safe directory for git"
  community.general.git_config:
    name: safe.directory
    scope: global
    value: /srv/git/orascript
  tags:
    - database-client
    - config
    - oracle
    - database-client_oracle
    - database-client_oracle_config

- name: "oracle : Clone orascript repository"
  ansible.builtin.git:
    repo: git@github.com:rewse/orascript.git
    dest: /srv/git/orascript
    accept_hostkey: true
    key_file: /home/{{ admin }}/.ssh/id_rsa
    version: master
  tags:
    - database-client
    - install
    - oracle
    - database-client_oracle
    - database-client_oracle_config

- name: "oracle : Set ownership of orascript"
  ansible.builtin.file:
    path: /srv/git/orascript
    owner: "{{ admin }}"
    group: "{{ admin }}"
    recurse: true
  tags:
    - database-client
    - config
    - oracle
    - database-client_oracle
    - database-client_oracle_config

- name: "oracle : Copy orarc to admin home"
  become: true
  become_user: "{{ admin }}"
  ansible.builtin.copy:
    src: /srv/git/orascript/orarc
    dest: /home/{{ admin }}/.orarc
    remote_src: true
    mode: '0644'
  tags:
    - database-client
    - config
    - oracle
    - database-client_oracle
    - database-client_oracle_config

- name: "oracle : Create symlink for orascript/common"
  become: true
  become_user: "{{ admin }}"
  ansible.builtin.file:
    src: /srv/git/orascript/common
    dest: /home/{{ admin }}/oracle
    state: link
  tags:
    - database-client
    - config
    - oracle
    - database-client_oracle
    - database-client_oracle_init

- name: "redshift : Download JDBC driver"
  ansible.builtin.get_url:
    url: https://s3.amazonaws.com/redshift-downloads/drivers/jdbc/{{ database_redshift_jdbc_version }}/redshift-jdbc42-{{ database_redshift_jdbc_version }}.jar
    dest: /usr/share/java
    mode: '0644'
  tags:
    - database-client
    - install
    - redshift
    - database-client_redshift
    - database-client_redshift_download

- name: "redshift : Create symlinks for JDBC driver"
  ansible.builtin.file:
    src: redshift-jdbc42-{{ database_redshift_jdbc_version }}.jar
    dest: /usr/share/java/{{ item }}
    state: link
  loop:
    - redshift-jdbc42.jar
    - redshift-jdbc.jar
  tags:
    - database-client
    - config
    - redshift
    - database-client_redshift
    - database-client_redshift_init
