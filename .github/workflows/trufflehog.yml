name: TruffleHog

on:
  schedule:
    - cron: "57 19 * * 0"  # Every Monday at 04:57 JST (19:57 UTC Sun)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Secret Sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          base: ""
          head: main
          extra_args: --results=verified,unknown
